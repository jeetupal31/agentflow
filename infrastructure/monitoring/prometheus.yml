global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:4001"]

  - job_name: "workflow-service"
    static_configs:
      - targets: ["workflow-service:4002"]

  - job_name: "execution-engine"
    static_configs:
      - targets: ["execution-engine:4003"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
