name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: --health-cmd "mongosh --eval \"db.adminCommand('ping')\"" --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests (execution-engine)
        working-directory: services/execution-engine
        run: npm run test
        env:
          MONGO_URI: mongodb://localhost:27017/agentflow_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          OPENROUTER_API_KEY: test-key

      - name: Run tests (auth-service)
        working-directory: services/auth-service
        run: npm run test
        env:
          MONGO_URI: mongodb://localhost:27017/agentflow_test
          JWT_SECRET: test-secret

  build:
    name: Build All Services
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build --workspace=packages/shared-types --workspace=packages/shared-utils

      - name: Build auth-service
        run: npm run build --workspace=services/auth-service

      - name: Build workflow-service
        run: npm run build --workspace=services/workflow-service

      - name: Build execution-engine
        run: npm run build --workspace=services/execution-engine

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build auth image
        run: docker build -f infrastructure/docker/Dockerfile.auth -t agentflow-auth:test .

      - name: Build engine image
        run: docker build -f infrastructure/docker/Dockerfile.engine -t agentflow-engine:test .
